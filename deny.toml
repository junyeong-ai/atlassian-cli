[graph]
all-features = true

[output]
feature-depth = 1

[advisories]
yanked = "deny"

[licenses]
confidence-threshold = 0.95
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = false
deny = [
  { name = "openssl-sys", reason = "TLS goes through rustls (reqwest's rustls feature). Avoid system OpenSSL for portability and compliance." },
  { name = "native-tls",  reason = "Same as above — keep TLS exclusively on rustls." },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
