name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_TOOLCHAIN: 1.96.0
  BIN_NAME: atlassian-cli

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-26-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}
          save-if: 'false'

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"           # e.g. v0.2.0
          target="${{ matrix.target }}"
          stem="${BIN_NAME}-${tag}-${target}" # e.g. atlassian-cli-v0.2.0-x86_64-unknown-linux-gnu
          mkdir -p dist staging
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            bin="${BIN_NAME}.exe"
            cp "target/${target}/release/${bin}" "staging/${bin}"
            (cd staging && 7z a -bd "../dist/${stem}.zip" "${bin}" >/dev/null)
            asset="dist/${stem}.zip"
          else
            bin="${BIN_NAME}"
            cp "target/${target}/release/${bin}" "staging/${bin}"
            tar -C staging -czf "dist/${stem}.tar.gz" "${bin}"
            asset="dist/${stem}.tar.gz"
          fi
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"
          echo "stem=${stem}"   >> "$GITHUB_OUTPUT"

      - name: SHA-256 checksum
        shell: bash
        run: |
          set -euo pipefail
          asset="${{ steps.pkg.outputs.asset }}"
          dir="$(dirname "$asset")"
          base="$(basename "$asset")"
          # Run from the asset's directory so the checksum file records the bare
          # filename (no "dist/" prefix); install.sh downloads to a flat temp dir.
          if command -v sha256sum >/dev/null; then
            (cd "$dir" && sha256sum "$base" > "${base}.sha256")
          else
            (cd "$dir" && shasum -a 256 "$base" > "${base}.sha256")
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.pkg.outputs.asset }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          retention-days: 1
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: Generate source SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./
          format: spdx-json
          artifact-name: ${{ env.BIN_NAME }}-${{ github.ref_name }}.spdx.json
          output-file: artifacts/${{ env.BIN_NAME }}-${{ github.ref_name }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Inventory
        run: ls -lh artifacts/

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
