name: Feature Request
description: Propose a new capability or enhancement.
title: "feat: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve? Who hits it, and how often?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        How should the CLI behave? Sketch the flag/command shape, output
        format, and any new config field.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fall short.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Jira
        - Confluence
        - Auth / config
        - Output / formatting
        - Tooling / CI
        - Other
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and discussions for duplicates.
          required: true
